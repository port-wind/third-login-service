# 测试环境配置
# 部署命令: pnpm wrangler deploy --config wrangler.dev.toml

name = "third-login-service-dev"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# D1 数据库（测试环境）
[[d1_databases]]
binding = "AUTH_DB"
database_name = "third-login-service-db-dev"
database_id = "dee6c88b-25c7-435d-8547-fb6fc698b827"  # 替换为你的测试环境 D1 ID

# KV 存储（测试环境）
[[kv_namespaces]]
binding = "AUTH_KV"
id = "e7ba2d4b7d894853ac0203b57c3cf166"  # 替换为你的测试环境 KV ID

# 环境变量
[vars]
# JWT 配置
JWT_SECRET = "dev-jwt-secret-key-change-in-production"
