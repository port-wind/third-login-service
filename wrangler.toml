# 当前激活的环境配置（默认使用测试环境）
# 测试环境部署: pnpm wrangler deploy --config wrangler.dev.toml
# 生产环境部署: pnpm wrangler deploy --config wrangler.prod.toml

name = "third-login-service-dev"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# D1 数据库绑定
[[d1_databases]]
binding = "AUTH_DB"
database_name = "third-login-service-db"
database_id = "dee6c88b-25c7-435d-8547-fb6fc698b827"

# KV 命名空间绑定（用于防重放攻击）
[[kv_namespaces]]
binding = "AUTH_KV"
id = "e7ba2d4b7d894853ac0203b57c3cf166"

# 环境变量
[vars]
JWT_SECRET = "your-jwt-secret-key-change-in-production"
JWT_EXPIRES_IN = "7d"

