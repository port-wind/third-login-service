# 生产环境配置（模板）
# 部署命令: pnpm wrangler deploy --config wrangler.prod.toml

name = "third-login-service-prod"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# D1 数据库（生产环境）
[[d1_databases]]
binding = "AUTH_DB"
database_name = "third-login-service-db-prod"
database_id = "110bca5d-b939-498f-bd4d-85362af173c2"  # 🔴 替换为生产环境 D1 ID

# KV 存储（生产环境）
[[kv_namespaces]]
binding = "AUTH_KV"
id = "524c486089de4617ac42a171ce67b69d"  # 🔴 替换为生产环境 KV ID

# 环境变量
[vars]
# JWT 配置
JWT_SECRET = "YOUR_PROD_JWT_SECRET"  # 🔴 替换为生产环境密钥（强密码）
JWT_EXPIRES_IN = "7d"

# Google OAuth 配置（生产环境）
