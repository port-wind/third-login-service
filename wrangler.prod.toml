# Firebase：API_KEY / AUTH_DOMAIN 仅测试页用（可选）；PROJECT_ID 启用手机登录时必填（校验 Token aud/iss）
FIREBASE_API_KEY = "YOUR_FIREBASE_API_KEY"  # 🟡 可选
FIREBASE_AUTH_DOMAIN = "YOUR_PROJECT.firebaseapp.com"  # 🟡 可选
FIREBASE_PROJECT_ID = "YOUR_PROJECT_ID"  # 🟡 Phone 登录必填，与客户端 Firebase 项目一致

