# 生产环境配置
# 部署命令: pnpm wrangler deploy --config wrangler.prod.toml

name = "third-login-service-prod"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]
account_id = "075b27c53018d626b57d1b597d5a024c"  # 生产账号 ID

# D1 数据库（生产环境）
[[d1_databases]]
binding = "AUTH_DB"
database_name = "third-login-service-db-prod"
database_id = "21adb4be-583d-4d02-8379-c2bc60c03256"  # 生产环境 D1 ID

# KV 存储（生产环境）
[[kv_namespaces]]
binding = "AUTH_KV"
id = "e5e76b722b624ad8ae280ddb2b90094f"  # third-login-service-kv-prod

# 环境变量
[vars]
